services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: interviewgpt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interviewgpt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewgpt_secret}
      POSTGRES_DB: ${POSTGRES_DB:-interviewgpt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interviewgpt}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChromaDB
  chromadb:
    image: chromadb/chroma:latest
    container_name: interviewgpt-chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: TRUE
      ANONYMIZED_TELEMETRY: FALSE

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewgpt-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-interviewgpt}:${POSTGRES_PASSWORD:-interviewgpt_secret}@db:5432/${POSTGRES_DB:-interviewgpt}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PYTHONPATH: /app

      # OLLAMA
      USE_OLLAMA: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./backend:/app/backend
      - upload_data:/app/uploads

    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewgpt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  upload_data:
